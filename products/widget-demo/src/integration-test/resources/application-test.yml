# ============================================================================
# Test Profile Configuration (Story 2.7)
# ============================================================================
# Override configuration for integration tests with Testcontainers.
# Disables features that require external services or unnecessary auto-configuration.
# ============================================================================

spring:
  # Disable JMX for tests (not needed)
  jmx:
    enabled: false

  datasource:
    url: jdbc:tc:postgresql:16.10-alpine:///eaf_test
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  # Allow bean overriding for test flexibility
  main:
    allow-bean-definition-overriding: true

  # Disable Flyway for tests (Testcontainers handles schema)
  flyway:
    enabled: false

  # Disable Spring Modulith Events (using Axon events exclusively)
  modulith:
    events:
      jdbc:
        enabled: false
      jpa:
        enabled: false

  # Disable Spring Security for tests (Story 3.1)
  # Security will be properly tested in Epic 3 integration tests
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - org.springframework.modulith.events.jpa.JpaEventPublicationAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.modulith.events.jpa.archiving.ArchivingAutoConfiguration

# Disable Management/Actuator for tests (avoids OpenTelemetry issues)
management:
  endpoints:
    enabled-by-default: false
  metrics:
    enable:
      all: false
  tracing:
    enabled: false

# Disable Axon Server (using JDBC event store)
axon:
  axonserver:
    enabled: false

  eventhandling:
    processors:
      # Default event processor configuration
      __default__:
        mode: tracking
        source: eventStore

# Logging level for tests
logging:
  level:
    root: WARN
    com.axians.eaf: INFO
    org.axonframework: WARN
    org.springframework: WARN
    org.testcontainers: INFO
