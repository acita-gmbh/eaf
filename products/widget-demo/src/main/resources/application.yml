# ============================================================================
# EAF Widget Demo Application Configuration
# ============================================================================
# Spring Boot application configuration for the Widget Demo reference application.
# This configuration demonstrates EAF framework integration with PostgreSQL event store.
#
# Environment: Development (local)
# Database: PostgreSQL 16.10 (docker-compose)
# Event Store: Axon Framework JDBC
# ============================================================================

spring:
  application:
    name: eaf-widget-demo

  # ============================================================================
  # DataSource Configuration (Story 2.2)
  # ============================================================================
  # PostgreSQL connection for Axon event store and application data.
  # Credentials match docker-compose PostgreSQL service (Story 1.5).
  datasource:
    url: jdbc:postgresql://localhost:5432/eaf
    username: eaf_user
    password: eaf_password
    driver-class-name: org.postgresql.Driver

    # HikariCP connection pool settings (optimal for event store)
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ============================================================================
  # Flyway Migration Configuration (Story 2.2)
  # ============================================================================
  # Enables automatic database migration on application startup.
  # Migrations in framework/persistence/src/main/resources/db/migration/
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false

  # ============================================================================
  # JPA Configuration (Required by Spring Boot Data JPA)
  # ============================================================================
  # While EAF uses CQRS/Event Sourcing, JPA is used for read model projections.
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    hibernate:
      ddl-auto: none  # Schema managed by Flyway, not Hibernate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # ============================================================================
  # Spring Security OAuth2 Configuration (Story 3.1)
  # ============================================================================
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${eaf.security.jwt.issuer-uri}
          jwk-set-uri: ${eaf.security.jwt.jwks-uri}

# ============================================================================
# Axon Framework Configuration
# ============================================================================
# Axon event store and CQRS settings (Story 2.1-2.2)
axon:
  eventhandling:
    processors:
      # Default event processor configuration
      __default__:
        mode: tracking
        source: eventStore

  # Serialization settings
  serializer:
    general: jackson
    events: jackson
    messages: jackson

  # Disable Axon Server (using JDBC event store)
  axonserver:
    enabled: false

# ============================================================================
# Spring Modulith Configuration
# ============================================================================
# Disable Spring Modulith Events (using Axon events exclusively)
spring.modulith:
  events:
    jdbc:
      enabled: false

# ============================================================================
# Logging Configuration (Development)
# ============================================================================
logging:
  level:
    root: INFO
    com.axians.eaf: DEBUG
    org.axonframework: DEBUG
    org.flywaydb: DEBUG
    org.springframework.jdbc: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# ============================================================================
# Management & Actuator (Story 5.x - Observability)
# ============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

# ============================================================================
# Server Configuration
# ============================================================================
server:
  port: 8090
  error:
    include-message: always
    include-binding-errors: always

# ============================================================================
# EAF Security Configuration (Stories 3.1-3.2)
# ============================================================================
# JWT OAuth2 Resource Server configuration for Keycloak OIDC integration
eaf:
  security:
    jwt:
      issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/eaf}
      jwks-uri: ${KEYCLOAK_JWKS_URI:http://keycloak:8080/realms/eaf/protocol/openid-connect/certs}
      audience: ${JWT_AUDIENCE:eaf-api}
      jwks-cache-duration: ${JWKS_CACHE_DURATION:10m}  # Story 3.2: JWKS public key cache duration
