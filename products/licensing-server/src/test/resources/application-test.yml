spring:
  datasource:
    # Testcontainers will override these dynamically
    url: jdbc:postgresql://localhost/testdb
    username: test
    password: test
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      resourceserver:
        jwt:
          # Testcontainers will override this dynamically
          issuer-uri: http://localhost:8180/realms/eaf

axon:
  axonserver:
    enabled: false
  eventhandling:
    processors:
      default:
        mode: tracking

logging:
  level:
    com.axians.eaf: DEBUG
    org.axonframework: DEBUG
    org.testcontainers: INFO