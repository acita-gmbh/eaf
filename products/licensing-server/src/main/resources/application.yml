spring:
  application:
    name: eaf-licensing-server
  profiles:
    active: dev
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/eaf}
    username: ${SPRING_DATASOURCE_USERNAME:eaf}
    password: ${SPRING_DATASOURCE_PASSWORD:eaf}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/eaf}

# EAF Security Configuration
eaf:
  security:
    cors:
      # Configure allowed origins for CORS requests (comma-separated)
      # For production, set via environment variable: EAF_SECURITY_CORS_ALLOWED_ORIGIN_PATTERNS
      allowed-origin-patterns: ${EAF_SECURITY_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:8080}
    jwt:
      expected-issuer: "${EAF_JWT_ISSUER:http://localhost:8180/realms/eaf}"
      expected-audience: "${EAF_JWT_AUDIENCE:eaf-backend}"

# Axon Framework configuration
axon:
  axonserver:
    enabled: false
  eventhandling:
    processors:
      # Configure tracking processors for projections
      default:
        mode: tracking
        source: eventBus
      widget-projection:
        mode: tracking
        source: eventBus
        # Performance optimization for projection processing
        threadCount: 1
        batchSize: 10
        # Target <200ms p95 latency processing
  serializer:
    events: jackson
    messages: jackson

# Server configuration
server:
  port: 8080
  servlet:
    context-path: /api

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  tracing:
    enabled: true
    sampling:
      # 100% sampling for dev/test. WARNING: Significant performance impact in production.
      # For production: use application-prod.yml (10% sampling) or set OTEL_SAMPLING_RATE=0.1
      probability: ${OTEL_SAMPLING_RATE:1.0}

# OpenTelemetry tracing configuration
otel:
  service:
    name: ${spring.application.name}
  traces:
    exporter: otlp
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_ENDPOINT:http://localhost:4317}
  resource:
    attributes:
      environment: ${EAF_ENVIRONMENT:dev}
      deployment.environment: ${EAF_ENVIRONMENT:dev}

# Logging configuration
logging:
  level:
    com.axians.eaf: DEBUG
    org.axonframework: INFO
    org.springframework.web: INFO
