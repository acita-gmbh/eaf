spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/eaf}
    username: ${SPRING_DATASOURCE_USERNAME:eaf}
    password: ${SPRING_DATASOURCE_PASSWORD:eaf}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never

axon:
  axonserver:
    enabled: false
