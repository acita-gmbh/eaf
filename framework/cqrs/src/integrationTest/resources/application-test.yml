spring:
  application:
    name: eaf-cqrs-test

  datasource:
    # Overridden by Testcontainers @DynamicPropertySource
    url: jdbc:postgresql://localhost:5432/eaf_test
    username: eaf_user
    password: eaf_password
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    root: INFO
    com.axians.eaf: DEBUG
    org.axonframework: DEBUG
