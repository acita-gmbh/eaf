        - "All query methods tested with nullable pattern"
    - level: "Integration Tests"
      purpose: "Validate jOOQ queries against real PostgreSQL"
      approach: "Testcontainers with PostgreSQL 16.1"
      tests:
        - "jOOQ repository integration tests"
        - "Event projection handlers with jOOQ writes"
    - level: "Validation Tests"
      purpose: "Compare JPA vs jOOQ output equivalence"
      approach: "Parallel execution with result comparison"
      tests:
        - "100+ scenarios comparing JPA and jOOQ query results"
        - "Edge cases: null values, empty lists, pagination boundaries"
    - level: "Performance Benchmarks"
      purpose: "Measure ≥20% improvement target"
      approach: "p50, p95, p99 latency measurement"
      tests:
        - "findByTenantIdOrderByCreatedAtDesc (1000 widgets, 100 iterations)"
        - "findByWidgetIdAndTenantId (single widget, 1000 iterations)"
        - "Pagination queries with filters"
