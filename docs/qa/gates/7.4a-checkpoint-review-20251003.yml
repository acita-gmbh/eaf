security_review:
  sec_001_xss_protection:
    status: "CORRECTLY_IMPLEMENTED"
    pattern: "DOMPurify sanitization for XSS prevention"
    implementation: |
      function sanitizeData(data: any): any {
        if (typeof data === 'string') {
          return DOMPurify.sanitize(data);  // ✅ DOMPurify correctly applied
        }
        if (Array.isArray(data)) {
          return data.map((item) => sanitizeData(item));  // ✅ Recursive
        }
        if (data && typeof data === 'object') {
          const sanitized: any = {};
          for (const [key, value] of Object.entries(data)) {
            sanitized[key] = sanitizeData(value);  // ✅ Deep sanitization
          }
          return sanitized;
        }
        return data;
      }
    validation: "XSS payloads (script tags, onerror, javascript:) correctly stripped in P0 tests"

  sec_002_tenant_validation:
    status: "CORRECTLY_IMPLEMENTED"
    pattern: "Fail-closed tenant context propagation"
    implementation: |
      const tenantId = extractTenantFromJWT(token);

      // FAIL-CLOSED: Reject request if tenant ID missing
      if (!tenantId) {
        throw new Error('Tenant context missing - access denied. Please re-login.');
      }

      headers.set('X-Tenant-ID', tenantId);  // ✅ Tenant header injection
    validation: "Missing tenant_id triggers request rejection. Generic error prevents CWE-209 disclosure."

  sec_003_token_refresh:
    status: "CORRECTLY_IMPLEMENTED"
    pattern: "Automatic token refresh <5 minutes remaining"
    implementation: |
      const expiresIn = getTokenExpiresIn(token);
      if (expiresIn < 5 * 60 * 1000 && expiresIn > 0) {
        try {
          await refreshAccessToken(tokenEndpoint, config.clientId);
        } catch (error) {
          localStorage.clear();  // ✅ Fail-safe: logout on refresh failure
          return Promise.reject(new Error('Session expired, please re-login'));
        }
      }
    validation: "Auto-refresh at 5-minute threshold. Refresh failure clears session (fail-safe)."

  rfc7807_error_mapping:
    status: "CORRECTLY_IMPLEMENTED"
    pattern: "RFC 7807 Problem Details error mapper"
    implementation: |
      export function parseRFC7807Error(error: any): { message: string; caption?: string } {
        if (error?.body?.type?.includes('/errors/')) {
          const problemDetails: ProblemDetails = error.body;
          return {
            message: problemDetails.detail || problemDetails.title || 'Operation failed',
            caption: problemDetails.traceId
              ? `Error ID: ${problemDetails.traceId} (copy for support)`
              : undefined,
          };
        }
        return {
          message: error?.message || 'An unexpected error occurred. Please try again.',
        };
      }
    validation: "TraceId extracted for support. Fallback handling for non-RFC 7807 errors."

