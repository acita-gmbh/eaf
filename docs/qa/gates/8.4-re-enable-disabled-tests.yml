test_design_summary:
  story_testing_approach: "Re-enable existing integration tests using proven @SpringBootTest pattern"
  test_levels:
    - level: "Integration Tests (Widget Domain)"
      purpose: "End-to-end CQRS flow validation"
      tests:
        - "WidgetIntegrationTest.kt - Full widget lifecycle"
        - "WidgetApiIntegrationTest.kt - REST API with authentication"
        - "WidgetEventStoreIntegrationTest.kt - Event persistence"
        - "WidgetWalkingSkeletonIntegrationTest.kt - Complete flow (command→event→projection→query)"
        - "WidgetEventProcessingIntegrationTest.kt - Projection handler validation"
    - level: "Integration Tests (Observability)"
      purpose: "Logging infrastructure validation"
      tests:
        - "LoggingContextIntegrationTest.kt - MDC context propagation"
        - "StructuredLoggingIntegrationTest.kt - JSON log format validation"
  priority_tests:
    p0:
      - "WidgetWalkingSkeletonIntegrationTest (end-to-end critical path)"
      - "WidgetApiIntegrationTest (REST API + auth validation)"
    p1:
      - "WidgetEventStoreIntegrationTest (event persistence)"
      - "WidgetEventProcessingIntegrationTest (projection handlers)"
    p2:
      - "LoggingContextIntegrationTest"
      - "StructuredLoggingIntegrationTest"
  coverage_gaps:
    - "Story doesn't specify what to do if >2 tests are unfixable (epic might be blocked)"

