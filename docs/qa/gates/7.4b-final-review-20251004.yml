## 3. CRITICAL GAP - Field Type Mapping
field_type_mapping_gap:
  status: CRITICAL_BLOCKER
  severity: HIGH
  blocks_epic_8: true

  problem_description: |
    Templates use Mustache conditional blocks ({{#isString}}, {{#isNumber}}, {{#isBoolean}}, {{#isDate}})
    but UiResourceGenerator.parseFields() does NOT generate these flags in the context.

    Current context structure:
    ```kotlin
    mapOf(
      "fieldName" to "name",
      "fieldLabel" to "Name",
      "fieldType" to "string",           // ✅ Generated
      "inputComponent" to "TextInput",   // ✅ Generated
      "fieldComponent" to "TextField"    // ✅ Generated
      // ❌ MISSING: "isString" to true
      // ❌ MISSING: "isNumber" to false
      // ❌ MISSING: "isBoolean" to false
      // ❌ MISSING: "isDate" to false
    )
    ```

    Impact: Templates render correctly but emit ZERO field blocks, producing broken UI.

  location: "UiResourceGenerator.kt:188-211 (parseFields method)"

  required_fix:
    code_change: |
      Add type flags to field context:
      ```kotlin
      mapOf(
          "fieldName" to fieldName,
          "fieldLabel" to fieldName.replaceFirstChar { it.uppercase() },
          "fieldType" to tsType,
          "inputComponent" to inputComponent,
          "fieldComponent" to fieldComponent,
          // ADD THESE:
          "isString" to (tsType == "string"),
          "isNumber" to (tsType == "number"),
          "isBoolean" to (tsType == "boolean"),
          "isDate" to (tsType == "Date"),
      )
      ```

    effort: "2-4 hours (simple boolean flags)"
    risk: LOW
    test_required: "7.4b-UNIT-004 (field parsing), 7.4b-INTEGRATION-001 (TypeScript compilation)"

  why_blocking: |
    Without this fix, generated components will have:
    - List.tsx: Empty DataGrid (no columns)
    - Create.tsx: Empty form (no inputs)
    - Edit.tsx: Empty form (no inputs)
    - Show.tsx: Empty layout (only ID and metadata)

    Epic 8 Stories 8.2/8.3 would generate broken Product/License UIs.

  alternative_approaches:
    - option_1:
        name: "FieldInfo data class"
        description: "Create dedicated FieldInfo(name, type, isString, isNumber, isBoolean, isDate)"
        effort: "4-6 hours"
        benefits: ["Type safety", "clearer API", "extensible for future enhancements"]
        story_reference: "Story 7.4b Dev Notes mentions FieldInfo (not yet implemented)"

    - option_2:
        name: "Quick boolean flags (RECOMMENDED)"
        description: "Add boolean flags directly to map (shown above)"
        effort: "2-4 hours"
        benefits: ["Fastest path to functional generator", "minimal risk"]
        trade_offs: ["Map-based (less type-safe)", "refactor to FieldInfo post-MVP"]

