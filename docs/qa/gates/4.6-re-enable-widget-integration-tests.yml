## Recommendations for Implementation (Updated)

### Pre-Implementation (CRITICAL)

1. **Quick Validation First** (15 minutes) - **MANDATORY**
   - Convert WidgetApiIntegrationTest.kt to field injection
   - Compile and verify BUILD SUCCESSFUL
   - **Benefit**: Proves hypothesis before investing 3+ hours
   - **Gate**: If fails, reassess approach

2. **Use Framework Template** (Ongoing)
   - Reference: framework/security/TenantContextFilterIntegrationTest.kt
   - Copy structure exactly
   - **Benefit**: Ensures pattern correctness

### During Implementation

3. **Incremental Conversion** (Task 2.1-2.5)
   - Convert 1 test → compile → validate → proceed
   - Commit after each successful conversion
   - **Benefit**: Early failure detection, rollback safety

4. **Expect Business Logic Failures** (Task 5.2)
   - Tests will compile but may fail at runtime (normal)
   - Expected: 404 (endpoints), schema errors, 401 (auth)
   - **Benefit**: Separate pattern issues from business logic

### Post-Implementation

5. **Measure Actual Performance** (Task 5.5)
   - Document total execution time
   - Compare to 258s estimate
   - Profile if >4 minutes

6. **Validate Regressions** (Task 5.4)
   - Run baseline test: TenantBoundaryValidationIntegrationTest
   - Run framework tests: security, cqrs
   - **Benefit**: Proves zero negative impact

7. **Document Pattern** (Task 6)
   - Add to CLAUDE.md with examples
   - Include anti-pattern warning
   - Reference framework modules

