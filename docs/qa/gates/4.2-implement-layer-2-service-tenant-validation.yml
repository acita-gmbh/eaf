# Critical Issues (Must Fix Before Implementation)
critical_issues:
  - id: "ISSUE-001"
    priority: "P0"
    category: "Security"
    title: "Validate ALL command handlers have TenantContext validation"
    description: |
      Current Widget.kt has gaps:
      - CreateWidgetCommand: NO validation (stated in story)
      - UpdateWidgetCommand: PARTIAL validation (lines 65-69)
      - DeleteWidgetCommand: Unknown status
    impact: "Tenant isolation bypass, cross-tenant data exposure"
    remediation: |
      1. Add TenantContext validation to CreateWidgetCommand constructor
      2. Enhance UpdateWidgetCommand with command AND aggregate validation
      3. Verify DeleteWidgetCommand coverage
      4. Add Konsist rule to enforce validation in ALL @CommandHandler methods
    verification:
      - "Code review: Verify validation in every command handler"
      - "UT-4.2-001, UT-4.2-002, UT-4.2-003: CreateWidget validation"
      - "UT-4.2-008, UT-4.2-009, UT-4.2-010: UpdateWidget validation"
      - "Konsist test: Verify ALL @CommandHandler methods call getCurrentTenantId()"

  - id: "ISSUE-002"
    priority: "P0"
    category: "Testing"
    title: "Verify transaction rollback in integration tests"
    description: |
      Integration tests must confirm:
      1. No events persisted after security exception
      2. Aggregate state unchanged (verify via query)
      3. Transaction rolled back by Axon
    impact: "False confidence in security guarantees, partial state persistence"
    remediation: |
      1. Add event store query to IT-4.2-005
      2. Verify event count before and after failed command
      3. Query aggregate state after failure
      4. Confirm original state preserved
    verification:
      - "IT-4.2-005: Transaction rollback verification"
      - "Event store query returns same count after failure"
      - "Aggregate query returns original state"

  - id: "ISSUE-003"
    priority: "P0"
    category: "Reliability"
    title: "Implement consistent error handling pattern"
    description: |
      Story requires TWO different error handling patterns:
      - CreateWidget: Exception-based (Axon constructor constraint)
      - UpdateWidget: Either-based (domain preference)

      Inconsistency creates confusion and maintenance burden.
    impact: "Code maintainability, developer confusion"
    remediation: |
      1. Create custom TenantIsolationException for constructors
      2. Match exception structure to WidgetError.TenantIsolationViolation
      3. Document Axon constraint in inline comments
      4. Add tests verifying both patterns produce equivalent security guarantees
    verification:
      - "UT-4.2-002: Verify TenantIsolationException thrown"
      - "UT-4.2-009: Verify Either.left(TenantIsolationViolation) returned"
      - "Code review: Verify inline documentation explains pattern difference"

# High Priority Recommendations (Should Fix Before Implementation)
high_priority_recommendations:
  - id: "REC-001"
    priority: "P1"
    category: "Documentation"
    title: "Add comprehensive inline documentation"
    description: |
      Code requires extensive documentation to explain:
      1. Dual error handling patterns (exception vs Either)
      2. Axon constructor constraint (cannot return Either)
      3. Transaction rollback guarantee (automatic with Axon)
      4. Static TenantContext access pattern
    rationale: "Complex patterns need explanation for future maintainers"
    implementation: |
      Add inline comments to Widget.kt:

      ```kotlin
      @CommandHandler
      constructor(command: CreateWidgetCommand) {
          // SECURITY: Validate tenant isolation (Layer 2 of defense-in-depth)
          // Axon constraint: Constructor handlers MUST throw exceptions (cannot return Either)
          val currentTenant = TenantContext.getCurrentTenantId()  // Fail-closed, throws if missing

          require(command.tenantId == currentTenant) {
              "Tenant isolation violation: command=\${command.tenantId}, context=$currentTenant"
          }
          // ↑ Exception triggers automatic transaction rollback (Axon guarantee)

          apply(WidgetCreatedEvent(
              widgetId = command.widgetId,
              tenantId = command.tenantId  // Already validated against TenantContext
          ))
      }
      ```
    verification:
      - "Code review: Verify inline comments present"
      - "Dev Notes updated with error handling rationale"

  - id: "REC-002"
    priority: "P1"
    category: "Testing"
    title: "Implement Kotest afterTest hook for automatic cleanup"
    description: |
      Unit tests require explicit TenantContext cleanup after every test.
      Forgotten cleanup causes test pollution and flaky tests.
    rationale: "Test isolation reliability, reduce manual cleanup burden"
    implementation: |
      ```kotlin
      class WidgetTest : BehaviorSpec({
          val meterRegistry = SimpleMeterRegistry()
          val tenantContext = TenantContext(meterRegistry)

          afterTest {
              // Automatic cleanup after every test
              tenantContext.clearCurrentTenant()
          }

          Given("a CreateWidgetCommand") {
              // Test implementation
              // NO manual cleanup needed
          }
      })
      ```
    verification:
      - "All unit tests use afterTest hook"
      - "Test isolation verified (run tests in parallel, check for failures)"

  - id: "REC-003"
    priority: "P1"
    category: "Security"
    title: "Add security logging for tenant isolation violations"
    description: |
      Tenant isolation violations should be logged for monitoring and forensics.
      Current story does not explicitly require logging.
    rationale: "Security monitoring, incident response, audit trail"
    implementation: |
      ```kotlin
      @CommandHandler
      constructor(command: CreateWidgetCommand, private val logger: Logger) {
          val currentTenant = TenantContext.getCurrentTenantId()

          if (command.tenantId != currentTenant) {
              logger.warn(
                  "Tenant isolation violation detected",
                  StructuredArguments.kv("aggregateId", command.widgetId),
                  StructuredArguments.kv("commandTenant", command.tenantId),
                  StructuredArguments.kv("contextTenant", currentTenant),
                  StructuredArguments.kv("commandType", "CreateWidgetCommand")
              )

              require(false) {
                  "Tenant isolation violation: command=\${command.tenantId}, context=$currentTenant"
              }
          }

          apply(WidgetCreatedEvent(...))
      }
      ```
    verification:
      - "Integration test: Verify WARN log emitted on violation"
      - "Verify structured fields present in log entry"

  - id: "REC-004"
    priority: "P1"
    category: "Testing"
    title: "Add event store verification to integration tests"
    description: |
      Integration tests should verify no events persisted after security failures.
      Current test design mentions this but story doesn't explicitly require it.
    rationale: "Comprehensive transaction rollback verification"
    implementation: |
      ```kotlin
      Then("no events should be persisted") {
          val events = eventStore.readEvents("widget-attack-1").asStream().toList()
          events shouldBe emptyList()
      }

      Then("event count unchanged") {
          val eventCountAfter = eventStore.readEvents(widgetId).asStream().count()
          eventCountAfter shouldBe eventCountBefore  // No new events
      }
      ```
    verification:
      - "IT-4.2-001: Verify no events for rejected create"
      - "IT-4.2-005: Verify event count unchanged after rollback"

