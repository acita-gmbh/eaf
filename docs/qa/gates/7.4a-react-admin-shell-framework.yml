# Top Issues Identified
top_issues:
  - id: "ISSUE-001"
    severity: "HIGH"
    category: "Security"
    title: "JWT localStorage storage (XSS vulnerability)"
    description: "Storing JWTs in localStorage creates XSS attack surface. If attacker injects malicious JS, tokens can be stolen."
    mitigation: "MVP: Short-lived tokens (15min), DOMPurify sanitization, backend CSP headers, README advisory. Post-MVP: httpOnly cookies, BFF pattern."
    tests:
      - "7.4a-UNIT-P0-001 (XSS sanitization)"
      - "7.4a-UNIT-P0-005 (token expiration)"
      - "7.4a-UNIT-P0-006 (token refresh)"

  - id: "ISSUE-002"
    severity: "HIGH"
    category: "Security"
    title: "Tenant context propagation failure"
    description: "Missing tenant_id in JWT or failed header injection could lead to cross-tenant data exposure."
    mitigation: "Fail-closed validation in dataProvider: reject request if tenant_id missing. Backend 3-layer enforcement as defense-in-depth."
    tests:
      - "7.4a-UNIT-P0-003 (tenant context propagation)"

  - id: "ISSUE-003"
    severity: "HIGH"
    category: "Security"
    title: "Keycloak OIDC flow implementation errors"
    description: "Custom OIDC implementation (no library) increases risk of subtle protocol errors in login/refresh/logout."
    mitigation: "Comprehensive unit/integration testing with edge cases (6 P0/P1 tests). Security architect code review. Consider oidc-client-ts library for future."
    tests:
      - "7.4a-UNIT-P0-004 (Keycloak login)"
      - "7.4a-UNIT-P0-005 (token expiration)"
      - "7.4a-UNIT-P0-006 (token refresh edge cases)"
      - "7.4a-UNIT-P1-004 (role extraction)"
      - "7.4a-UNIT-P1-005 (logout flow)"

  - id: "ISSUE-004"
    severity: "MEDIUM"
    category: "Maintainability"
    title: "Test coverage not yet implemented"
    description: "16 test scenarios defined but no test code written. Current coverage: 0% (target: 85% line, 80% mutation)."
    mitigation: "Implement all 16 tests in parallel with feature development. Prioritize P0 security tests (6 tests). Enforce coverage in CI before merge."
    tests:
      - "All 16 test scenarios from test-design document"

  - id: "ISSUE-005"
    severity: "MEDIUM"
    category: "Maintainability"
    title: "No linting/formatting configuration"
    description: "No ESLint or Prettier configured. Risk of code style inconsistencies and potential bugs (no-unused-vars, etc)."
    mitigation: "Add ESLint with TypeScript plugin, Prettier for formatting. Configure in CI/CD. Estimated time: 2 hours."
    tests:
      - "N/A (configuration, not test scenario)"

