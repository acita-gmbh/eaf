# Top Issues Identified
top_issues:
  - id: "ISSUE-001"
    severity: "HIGH"
    category: "Architecture"
    title: "Architectural dependency on Story 7.4a"
    description: "Generated UI resources import from @axians/eaf-admin-shell (7.4a). If 7.4a incomplete or has breaking changes, generated code will be broken."
    mitigation: "Validate framework/admin-shell exists and builds before generation (Task 3.6). Integration test verifies imports resolve and TypeScript compiles (7.4b-INTEGRATION-001). Sequential implementation: complete 7.4a core first."
    tests:
      - "7.4b-UNIT-006 (framework existence validation)"
      - "7.4b-INTEGRATION-001 (import framework, compile)"

  - id: "ISSUE-002"
    severity: "HIGH"
    category: "Security"
    title: "Path traversal and injection attacks"
    description: "CLI accepts user input for resource names. Malicious input could exploit path traversal or code injection."
    mitigation: "3-layer defense (proven in Story 7.3): input validation (PascalCase regex), path sanitization (remove ../), canonical path verification. Security-first TDD: implement 7.4b-UNIT-001 attack scenarios FIRST."
    tests:
      - "7.4b-UNIT-001 (attack scenarios - MUST implement FIRST)"

  - id: "ISSUE-003"
    severity: "MEDIUM"
    category: "Maintainability"
    title: "Test coverage not yet implemented"
    description: "8 test scenarios defined but no test code written. Current coverage: 0% (target: 85% line, 80% mutation)."
    mitigation: "Implement all 8 tests in parallel with feature development. Prioritize 7.4b-UNIT-001 security test FIRST. Enforce 85% coverage in CI before merge."
    tests:
      - "All 8 test scenarios from comprehensive assessment"

  - id: "ISSUE-004"
    severity: "MEDIUM"
    category: "Technical"
    title: "Template rendering incompleteness"
    description: "Mustache templates may have gaps or syntax errors, resulting in non-compiling generated code."
    mitigation: "Task 2 creates all 9 templates. Integration test (7.4b-INTEGRATION-001) verifies TypeScript compilation. Story 7.3 validated Mustache templating with 16 templates."
    tests:
      - "7.4b-UNIT-004 (template rendering)"
      - "7.4b-INTEGRATION-001 (TypeScript compilation)"

  - id: "ISSUE-005"
    severity: "MEDIUM"
    category: "Business"
    title: "Framework/product separation violation"
    description: "Generator might create files in wrong location (apps/admin instead of products/{module}/ui-module), violating Story 4.5 principle."
    mitigation: "Task 1 validates products/{productModule}/ exists (Task 1.1, Task 3.6). ProductModuleNotFound error if directory missing. Generated files go to products/{productModule}/ui-module/src/resources/{resourceLowerCase}/."
    tests:
      - "7.4b-UNIT-002 (product module validation)"
      - "7.4b-INTEGRATION-001 (verify correct directory)"

