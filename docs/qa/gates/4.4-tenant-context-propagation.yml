# Top Issues (Severity: low | medium | high)
top_issues:
  - id: "SEC-001"
    severity: high
    finding: "ThreadLocal TenantContext in pooled worker threads could leak tenant data across event processing boundaries"
    suggested_action: "Implement mandatory finally block in TenantEventMessageInterceptor for cleanup; add integration test validating sequential tenant isolation (4.4-INT-004, 4.4-INT-008)"
    suggested_owner: dev

  - id: "SEC-002"
    severity: high
    finding: "Event messages without tenantId metadata could bypass tenant validation if interceptor doesn't fail closed"
    suggested_action: "Add explicit null-check with SecurityException throw; validate with negative tests (4.4-UNIT-002, 4.4-INT-002)"
    suggested_owner: dev

  - id: "NFR-SEC-001"
    severity: medium
    finding: "No rate limiting on event processing - potential DoS via event flooding"
    suggested_action: "Add Redis-based rate limiter (100 events/second per tenant) to interceptor"
    suggested_owner: dev

  - id: "NFR-PERF-001"
    severity: medium
    finding: "No performance benchmarks for interceptor overhead - unknown latency impact"
    suggested_action: "Add Kotest performance test validating <5ms p95 latency per event (4.4-UNIT-005)"
    suggested_owner: dev

  - id: "NFR-MAINT-001"
    severity: medium
    finding: "Test coverage target not specified in story - risk of inadequate test coverage"
    suggested_action: "Add AC5: Achieve ≥85% line coverage and ≥80% mutation coverage per test strategy"
    suggested_owner: sm

