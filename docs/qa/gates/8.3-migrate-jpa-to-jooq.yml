top_issues:
  - id: '8.3-BUILD-001'
    severity: 'critical'
    category: 'build_infrastructure'
    description: 'Integration tests fail with ClassNotFoundException - Spring Boot cannot find application entry point in integrationTest source set.'
    impact: 'Cannot validate jOOQ implementation via integration tests. All 4 integration tests blocked.'
    recommendation: 'Add @SpringBootTest(classes = [WidgetDemoApplication::class]) to WidgetProjectionRepositoryIntegrationTest.'
    estimated_fix_time: '30 minutes'
    suggested_owner: 'dev'
    priority: 'P0'
    blocks_story: true

  - id: '8.3-REPO-001'
    severity: 'critical'
    category: 'security'
    description: 'save() method uses onConflict().doUpdate() without tenant_id validation in WHERE clause - potential cross-tenant data corruption.'
    impact: 'Tenant A could overwrite Tenant B projection if widget_id collision occurs. SECURITY VIOLATION of 3-layer tenant isolation.'
    recommendation: 'Add .where(TENANT_ID.eq(record.tenantId)) to doUpdate() clause OR split into separate insert/update methods with explicit tenant checks.'
    estimated_fix_time: '15 minutes'
    suggested_owner: 'dev'
    priority: 'P0'
    blocks_story: true
    security_impact: true

  - id: '8.3-TEST-002'
    severity: 'high'
    category: 'nfr_validation'
    description: 'Performance benchmark test exists but not executed - cannot verify AC 15 (≥20% improvement claim).'
    impact: 'Story acceptance criterion unvalidated. Unknown if jOOQ actually delivers performance improvement.'
    recommendation: 'After fixing 8.3-BUILD-001, run: ./gradlew :products:widget-demo:test --tests "*PerformanceBenchmarkTest"'
    estimated_fix_time: '15 minutes (after BUILD-001 resolved)'
    suggested_owner: 'dev'
    priority: 'P1'
    blocks_story: true

  - id: '8.3-IMPL-001'
    severity: 'high'
    category: 'functional_completeness'
    description: 'JooqWidgetProjectionRepository implemented but not integrated with WidgetQueryHandler or event handlers - JPA still in use.'
    impact: 'Migration incomplete - production code still uses JPA. Story AC 9-10 not met.'
    recommendation: 'Update WidgetQueryHandler and event handlers to use jOOQ repository.'
    estimated_fix_time: '2-3 hours'
    suggested_owner: 'dev'
    priority: 'P1'
    blocks_story: true

