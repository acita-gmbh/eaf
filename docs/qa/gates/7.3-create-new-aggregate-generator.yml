# Detailed Risk Register (from risk-profile analysis)
risks:
  - id: SEC-003
    category: security
    title: 'Template injection via malicious aggregate name'
    probability: 2  # Medium
    impact: 3  # High
    score: 6  # High Risk
    description: 'Malicious aggregate names could exploit template rendering to inject code, commands, or corrupt codebase'
    affected_components:
      - 'All 16 Mustache templates'
      - 'AggregateCommand input validation'
      - 'TemplateEngine rendering'
      - 'File system operations'
    mitigation:
      strategy: 'preventive'
      layers:
        - 'Layer 1: PascalCase regex validation ^[A-Z][A-Za-z0-9]*$'
        - 'Layer 2: Mustache HTML-escaping (validated Story 7.1)'
        - 'Layer 3: File system validation + defensive error handling'
      testing: '7.3-UNIT-007 with 5 attack scenarios'
      residual_risk: 'LOW'
    test_coverage:
      - '7.3-UNIT-007 (Primary - 5 attack scenarios)'
      - '7.3-UNIT-002 (Supporting - PascalCase validation)'
      - '7.3-INT-001 (Supporting - Real environment safety)'

  - id: TECH-007
    category: technical
    title: 'Template consistency across 16 files'
    probability: 2  # Medium
    impact: 2  # Medium
    score: 4  # Medium Risk
    description: 'Multi-file generation with cross-references prone to pattern drift (e.g., Command uses widgetId but Event uses id)'
    affected_components:
      - '16 Mustache templates'
      - 'AggregateContext naming transformations'
      - 'Cross-file references (Commands → Aggregates → Events → Projections)'
    mitigation:
      strategy: 'preventive'
      actions:
        - 'Widget.kt as single source of truth for all patterns'
        - '12 complete code examples in Dev Notes (9500+ words)'
        - 'Explicit naming conventions documented (PascalCase, camelCase, kebab-case)'
      testing: '7.3-UNIT-006 (syntax), 7.3-INT-002 (compilation), 7.3-INT-003 (quality gates)'
      residual_risk: 'LOW'
    test_coverage:
      - '7.3-UNIT-006 (Primary - Template rendering validation)'
      - '7.3-INT-002 (Validation - Compilation proves consistency)'
      - '7.3-INT-003 (Validation - Quality gates verify patterns)'
      - '7.3-INT-005 (Validation - Full CQRS flow proves integration)'

  - id: TECH-008
    category: technical
    title: 'Field parser type safety'
    probability: 2  # Medium
    impact: 2  # Medium
    score: 4  # Medium Risk
    description: 'CLI string parsing error-prone; invalid type mappings generate code that fails compilation'
    affected_components:
      - 'AggregateGenerator field parser (Task 3.4)'
      - 'Type mapping logic (Task 10.3)'
      - 'All generated files using field types'
    mitigation:
      strategy: 'preventive'
      actions:
        - 'Type whitelist: String, Int, Long, BigDecimal, Boolean, Instant'
        - 'Clear error messages listing supported types'
        - 'Validation during parsing, not rendering'
      testing: '7.3-UNIT-004 (valid), 7.3-UNIT-005 (invalid), 7.3-UNIT-009 (mapping)'
      residual_risk: 'LOW'
    test_coverage:
      - '7.3-UNIT-004 (Primary - Valid field parsing)'
      - '7.3-UNIT-005 (Primary - Invalid type handling)'
      - '7.3-UNIT-009 (Validation - Type mapping correctness)'

  - id: TECH-010
    category: technical
    title: 'Custom validation pattern security (ReDoS)'
    probability: 1  # Low
    impact: 3  # High
    score: 3  # Low Risk
    description: 'Malicious regex in --validation option could cause catastrophic backtracking (ReDoS) in generated code'
    affected_components:
      - 'Validation pattern parser (Task 3.5)'
      - 'Generated Aggregate companion object'
    mitigation:
      strategy: 'preventive'
      actions:
        - 'Regex pattern validation'
        - 'Recommended: Timeout protection (100ms limit)'
        - 'Recommended: Reject dangerous patterns (e.g., (.*)*)'
      testing: '7.3-UNIT-012'
      residual_risk: 'LOW'
    test_coverage:
      - '7.3-UNIT-012 (Custom validation parsing and rendering)'

  - id: TECH-009
    category: technical
    title: 'Module structure validation'
    probability: 1  # Low
    impact: 2  # Medium
    score: 2  # Low Risk
    description: 'Generation fails if module structure invalid or incomplete'
    mitigation:
      strategy: 'detective'
      actions:
        - 'Module existence check before generation'
        - 'Domain package verification'
        - 'Clear error messages with guidance'
      testing: '7.3-UNIT-003, 7.3-UNIT-011'
      residual_risk: 'MINIMAL'
    test_coverage:
      - '7.3-UNIT-003 (Module not found error)'
      - '7.3-UNIT-011 (Error handling validation)'

  - id: TECH-011
    category: technical
    title: 'Liquibase migration XML injection'
    probability: 1  # Low
    impact: 2  # Medium
    score: 2  # Low Risk
    description: 'XML injection could corrupt migration files or database schema'
    mitigation:
      strategy: 'preventive'
      actions:
        - 'Mustache HTML-escaping applies to XML'
        - 'Field name validation (same as aggregate name)'
        - 'SQL type mapping validated'
      testing: '7.3-UNIT-013, 7.3-UNIT-014'
      residual_risk: 'MINIMAL'
    test_coverage:
      - '7.3-UNIT-013 (Liquibase XML validation)'
      - '7.3-UNIT-014 (SQL type mapping)'

  - id: TECH-012
    category: technical
    title: 'Aggregate name collision'
    probability: 1  # Low
    impact: 2  # Medium
    score: 2  # Low Risk
    description: 'Generator could overwrite existing aggregate if duplication check fails'
    mitigation:
      strategy: 'detective'
      actions:
        - 'Pre-generation file existence check'
        - 'Fail-fast with descriptive error'
        - 'Git provides rollback mechanism'
      testing: '7.3-UNIT-011'
      residual_risk: 'MINIMAL'
    test_coverage:
      - '7.3-UNIT-011 (Aggregate exists error scenario)'

