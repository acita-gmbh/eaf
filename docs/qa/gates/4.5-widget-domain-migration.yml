updated: "2025-09-27T18:15:00Z"

waiver:
  active: false

top_issues:
  - id: "SEC-GAP-001"
    severity: high
    finding: "No secret scanning validation step in migration plan"
    impact: "Hard-coded credentials or API keys may be exposed during file migration, risking audit compliance failure"
    suggested_action: "Add Subtask 9.4: Run detect-secrets scan on all migrated files before module deletion. Success criteria: zero secrets detected."
    suggested_owner: "sm"
    story_section: "Task 9"
    resolution: "ADDRESSED - Subtask 9.4 added to story v1.2"

  - id: "SEC-GAP-002"
    severity: high
    finding: "No OWASP dependency vulnerability scan specified"
    impact: "New security-critical dependencies could be introduced without validation"
    suggested_action: "Add Subtask 11.5: Run ./gradlew :products:widget-demo:dependencyCheckAnalyze. Success criteria: zero HIGH/CRITICAL vulnerabilities."
    suggested_owner: "sm"
    story_section: "Task 11"
    resolution: "ADDRESSED - Subtask 11.5 added to story v1.2"

  - id: "REL-GAP-001"
    severity: medium
    finding: "No duplicate Spring bean detection validation"
    impact: "Duplicate bean definitions could cause runtime errors or incorrect bean wiring"
    suggested_action: "Add Subtask 11.6: Bean conflict scan using ApplicationContext.getBeansWithAnnotation. Success criteria: each bean has single definition."
    suggested_owner: "sm"
    story_section: "Task 11"
    resolution: "ADDRESSED - Subtask 11.6 added to story v1.2"

  - id: "ARCH-GAP-001"
    severity: medium
    finding: "Axon ProcessingGroup configuration not explicitly validated"
    impact: "Event handlers may not be registered if package-based configuration exists in application.yml"
    suggested_action: "Add Subtask 11.7: Verify application.yml has no package-based ProcessingGroup configuration for 'widget-projection'. Add integration test publishing test event to validate handler registration."
    suggested_owner: "dev"
    story_section: "Task 11"
    resolution: "ADDRESSED - Subtask 11.7 added to story v1.2"

