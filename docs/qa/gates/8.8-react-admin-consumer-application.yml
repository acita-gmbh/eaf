# Identified risks (full detail)
risks:
  - id: TECH-004
    category: technical
    title: "Frontend-Backend Integration Failures"
    description: "Authentication, CORS, data format issues between React-Admin and Spring Boot backend"
    probability: medium  # 2
    impact: high         # 3
    score: 6
    affected_components:
      - "App.tsx (Keycloak integration)"
      - "vite.config.ts (proxy configuration)"
      - "WidgetController REST API"
      - "Keycloak OIDC flow"
    mitigation: "Contract-first with OpenAPI spec. Vite proxy for CORS avoidance. Framework shell provides tested auth logic. Comprehensive Phase 4-5 manual testing (AC 16-27). Troubleshooting guide (lines 558-574)."
    testing_requirements:
      - "P0: Login flow (AC 16-19, Task 4)"
      - "P0: Widget CRUD operations (AC 20-27, Task 5)"
      - "P0: Tenant isolation (AC 27, Subtask 5.11)"
      - "P1: Error handling (AC 28-32, Task 6)"
    residual_risk: "Low - Comprehensive mitigation with troubleshooting"
    owner: dev

  - id: TECH-005
    category: technical
    title: "Workspace Dependency Resolution Failures"
    description: "npm/pnpm workspace dependencies may not resolve correctly (@axians/eaf-admin-shell, @eaf/widget-demo-ui)"
    probability: low   # 1
    impact: medium     # 2
    score: 2
    mitigation: "Task 3 dedicated to workspace setup. Troubleshooting guide (Issue 1). Clear examples provided. Subtask 3.4: explicit resolution verification."
    residual_risk: "Minimal - Well-understood with clear fix"
    owner: dev

  - id: SEC-002
    category: security
    title: "Keycloak Authentication Flow Issues"
    description: "Keycloak redirect loops, token refresh failures, or configuration mismatches"
    probability: low   # 1
    impact: high       # 3
    score: 3
    mitigation: "Framework shell provides tested auth logic (Epic 3 reuse). Complete keycloakConfig example. Task 4: 7 subtasks validate full OIDC flow. Troubleshooting for redirect loops (Issue 3)."
    residual_risk: "Very Low - Reuses tested infrastructure"
    owner: dev

  - id: SEC-003
    category: security
    title: "WCAG AA Accessibility Compliance Failures"
    description: "WCAG AA standards not met (keyboard nav, screen reader, contrast, focus, labels)"
    probability: low   # 1
    impact: medium     # 2
    score: 2
    mitigation: "Material UI provides baseline ARIA. React-Admin has accessibility built-in. Task 7: 11 subtasks cover all WCAG AA criteria. Validation tools specified (axe DevTools, WAVE, screen readers)."
    residual_risk: "Very Low - Comprehensive validation planned"
    owner: dev

  - id: TECH-006
    category: technical
    title: "UI Resource Generator Failures"
    description: "CLI eaf scaffold ui-resource might fail or generate incorrect structure"
    probability: low   # 1
    impact: medium     # 2
    score: 2
    mitigation: "CLI already tested in Story 7.4b. Subtask 1.1: verify executable. Subtasks 1.3-1.6: validate generated structure and build. Fallback: manual component creation."
    residual_risk: "Minimal - Tool functional, fallback available"
    owner: dev

  - id: TECH-007
    category: technical
    title: "Gradle-npm Integration Issues"
    description: "Gradle npm tasks might fail on different platforms"
    probability: low   # 1
    impact: low        # 1
    score: 1
    mitigation: "Complete build.gradle.kts example provided. Standard Gradle Exec task pattern. Subtasks 8.2-8.4 validate tasks. Fallback: manual npm commands."
    residual_risk: "Negligible - Non-critical convenience feature"
    owner: dev

