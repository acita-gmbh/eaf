# SBOM (Software Bill of Materials) Generation - Supply Chain Security (A03:2025)
# Generates CycloneDX SBOM for all project dependencies

name: Generate SBOM

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  generate-sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for gradlew
        run: chmod +x gradlew

      - name: Generate CycloneDX SBOM
        run: |
          ./gradlew cyclonedxBom \
            --info \
            --no-daemon
        continue-on-error: false

      - name: Collect SBOM Files
        run: |
          mkdir -p sbom-output
          find . -name "bom.json" -o -name "bom.xml" | while read file; do
            module_name=$(echo "$file" | sed 's|./||' | sed 's|/build/reports/bom.*||' | tr '/' '-')
            cp "$file" "sbom-output/${module_name}-$(basename $file)"
          done
          ls -lh sbom-output/

      - name: Upload SBOM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom-output/*
          retention-days: 90

      - name: Generate SBOM Summary
        run: |
          echo "## 📦 Software Bill of Materials (SBOM)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Format:** CycloneDX 1.5" >> $GITHUB_STEP_SUMMARY
          echo "**Generated:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated SBOMs:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ls -1 sbom-output/ | while read file; do
            size=$(du -h "sbom-output/$file" | cut -f1)
            echo "- \`$file\` ($size)" >> $GITHUB_STEP_SUMMARY
          done

      - name: Attach SBOM to Release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for file in sbom-output/*; do
            gh release upload ${{ github.event.release.tag_name }} "$file" --clobber
          done

      - name: Sign SBOM (Optional)
        if: github.event_name == 'release'
        run: |
          # TODO: Implement SBOM signing with GPG or Sigstore
          echo "::notice::SBOM signing not yet implemented - planned for SLSA Level 2"
