name: Security Review

on:
  push:
    branches: [main]
    paths:
      - 'gradle/libs.versions.toml'
      - '**/*.gradle.kts'
      - 'settings.gradle.kts'
  pull_request:
    branches: [main]
    paths:
      - 'gradle/libs.versions.toml'
      - '**/*.gradle.kts'
      - 'settings.gradle.kts'
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  owasp-dependency-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x ./gradlew

      - name: Cache OWASP Dependency Check Data
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: ${{ runner.os }}-dependency-check-${{ hashFiles('gradle/libs.versions.toml') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-${{ hashFiles('gradle/libs.versions.toml') }}-
            ${{ runner.os }}-dependency-check-

      - name: OWASP Dependency Check Analysis
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./gradlew dependencyCheckAnalyze --no-daemon --stacktrace

      - name: Upload OWASP Dependency Check Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: '**/build/reports/dependency-check-report.html'
          retention-days: 30

      - name: Fail on Critical Vulnerabilities
        if: failure()
        run: |
          echo "::error::OWASP Dependency Check found critical vulnerabilities. Review the uploaded report."
          exit 1
