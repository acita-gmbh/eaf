name: Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
  NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.event_name == 'pull_request' }}

      - name: Prime compilation
        run: ./gradlew compileKotlin --no-daemon --stacktrace

      - name: Run ktlint, Detekt, and Konsist
        run: ./gradlew ktlintCheck detekt konsistTest --no-daemon --stacktrace

  test:
    name: Test & Coverage
    needs: quality-gates
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        os: [ubuntu-latest]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install Docker client on macOS
        if: matrix.os == 'macos-latest'
        run: |
          brew install docker docker-compose || true

      - name: Prepare Docker on macOS
        if: matrix.os == 'macos-latest'
        run: |
          brew install colima || true
          mkdir -p /tmp/colima
          colima start --cpu 4 --memory 8 --disk 60 || colima start
          docker context use colima || true
          docker info

      - name: Run unit and integration suites
        run: ./gradlew test integrationTest jacocoTestReport jacocoTestCoverageVerification --no-daemon --stacktrace

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  mutation-testing:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run mutation testing
        run: ./gradlew pitest --no-daemon --stacktrace

  security-scan:
    needs: quality-gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPENDENCY_CHECK_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Prepare dependency-check cache dir
        if: ${{ env.DEPENDENCY_CHECK_ENABLED == 'true' }}
        run: mkdir -p "${{ env.GRADLE_USER_HOME }}/dependency-check-data"

      - name: Cache dependency-check data
        uses: actions/cache@v4
        if: ${{ env.DEPENDENCY_CHECK_ENABLED == 'true' }}
        with:
          path: ${{ env.GRADLE_USER_HOME }}/dependency-check-data
          key: dependency-check-${{ runner.os }}-v1

      - name: Run dependency check
        if: ${{ env.DEPENDENCY_CHECK_ENABLED == 'true' }}
        run: ./gradlew dependencyCheckAnalyze --no-daemon --stacktrace

      - name: Skip dependency check (awaiting NVD API key)
        if: ${{ env.DEPENDENCY_CHECK_ENABLED != 'true' }}
        run: echo "Dependency check temporarily disabled until NVD API key is available."
