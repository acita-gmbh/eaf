name: CI - Fast Feedback

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Hard limit: must complete in <15min normally

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          cache-cleanup: always

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Project
        run: ./gradlew assemble --no-daemon --stacktrace

      - name: Code Formatting Check (ktlint)
        run: ./gradlew ktlintCheck --no-daemon

      - name: Static Analysis (Detekt)
        run: ./gradlew detekt --no-daemon

      - name: Unit Tests (JUnit Platform for XML reports)
        run: ./gradlew ciTests --no-daemon

      - name: Integration Tests
        run: ./gradlew integrationTest --no-daemon --stacktrace

      - name: Architecture Tests (Konsist)
        run: ./gradlew :shared:testing:test --no-daemon

      - name: Generate Coverage Report
        if: always()
        run: ./gradlew koverXmlReport --no-daemon

      - name: Upload Coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: '**/build/reports/kover/report.xml'
          flags: unittests,integrationtests
          name: eaf-coverage
          fail_ci_if_error: false  # Don't fail if Codecov is down
          verbose: true

      - name: Shell Script Analysis (shellcheck)
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          find scripts/ -name "*.sh" -exec shellcheck {} \;

      - name: Upload Test Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_number }}
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-${{ github.run_number }}
          path: |
            **/build/reports/kover/
          retention-days: 90
