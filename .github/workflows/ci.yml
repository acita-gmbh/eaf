name: Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
  NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

jobs:
  test:
    name: Test & Coverage
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        os: [ubuntu-latest]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install Docker client on macOS
        if: matrix.os == 'macos-latest'
        run: |
          brew install docker docker-compose || true

      - name: Prepare Docker on macOS
        if: matrix.os == 'macos-latest'
        run: |
          brew install colima || true
          mkdir -p /tmp/colima
          colima start --cpu 4 --memory 8 --disk 60 || colima start
          docker context use colima || true
          docker info

      - name: Run unit and integration tests with CI configuration
        # Story 8.7: ciPerfTest removed - performance tests are nightly-only for fast PR feedback
        run: ./gradlew ciTest ciIntegrationTest koverXmlReport koverVerify --no-daemon --stacktrace

      # TODO: Re-enable when GitHub Actions permissions are fixed
      # - name: Publish Test Results
      #   uses: EnricoMi/publish-unit-test-result-action@v2
      #   if: always()
      #   with:
      #     files: |
      #       **/build/test-results/ciTest/*.xml
      #       **/build/test-results/ciIntegrationTest/*.xml
      #     check_name: Test Results
      #     comment_mode: always

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-reports-${{ matrix.os }}
          path: |
            **/build/reports/tests/ciTest/
            **/build/reports/tests/ciIntegrationTest/
          retention-days: 7

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          # Multi-module Gradle project: find all Kover XML reports (Story 8.6: migrated from JaCoCo)
          files: ./**/build/reports/kover/report.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false


  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPENDENCY_CHECK_ENABLED: "false"  # Temporarily disabled due to NVD API timeout issues
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Prepare dependency-check cache dir
        if: ${{ env.DEPENDENCY_CHECK_ENABLED == 'true' }}
        run: mkdir -p "${{ env.GRADLE_USER_HOME }}/dependency-check-data"

      - name: Cache dependency-check data
        uses: actions/cache@v4
        if: ${{ env.DEPENDENCY_CHECK_ENABLED == 'true' }}
        with:
          path: ${{ env.GRADLE_USER_HOME }}/dependency-check-data
          key: dependency-check-${{ runner.os }}-v1

      - name: Run dependency check
        if: ${{ env.DEPENDENCY_CHECK_ENABLED == 'true' }}
        timeout-minutes: 15
        run: ./gradlew dependencyCheckAnalyze --no-daemon --stacktrace

      - name: Skip dependency check (awaiting NVD API key)
        if: ${{ env.DEPENDENCY_CHECK_ENABLED != 'true' }}
        run: echo "Dependency check temporarily disabled until NVD API key is available."
