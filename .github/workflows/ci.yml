name: Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.event_name == 'pull_request' }}

      - name: Prime compilation
        run: ./gradlew compileKotlin --no-daemon --stacktrace

      - name: Run ktlint, Detekt, and Konsist
        run: ./gradlew ktlintCheck detekt konsistTest --no-daemon --stacktrace

  test:
    name: Test & Coverage
    needs: quality-gates
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install Docker client on macOS
        if: matrix.os == 'macos-latest'
        run: |
          brew install docker docker-compose || true

      - name: Prepare Docker on macOS
        if: matrix.os == 'macos-latest'
        run: |
          brew install colima || true
          mkdir -p /tmp/colima
          colima start --cpu 4 --memory 8 --disk 60 --vm-type qemu --mount-type sshfs || colima start --vm-type qemu --mount-type sshfs
          docker context use colima || true
          docker info

      - name: Run unit and integration suites
        run: ./gradlew test integrationTest jacocoTestReport jacocoTestCoverageVerification --no-daemon --stacktrace

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  mutation-testing:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run mutation testing
        run: ./gradlew pitest --no-daemon --stacktrace

  security-scan:
    needs: quality-gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run dependency check
        run: ./gradlew dependencyCheckAnalyze --no-daemon --stacktrace
