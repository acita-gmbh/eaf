name: CI - Fast Feedback

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Hard limit: must complete in <15min normally

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x ./gradlew

      - name: Build Project
        run: ./gradlew build --no-daemon --stacktrace

      - name: Code Formatting Check (ktlint)
        run: ./gradlew ktlintCheck --no-daemon

      - name: Static Analysis (Detekt)
        run: ./gradlew detekt --no-daemon

      - name: Unit Tests
        run: ./gradlew test --no-daemon

      - name: Integration Tests
        run: ./gradlew integrationTest --no-daemon --stacktrace

      - name: Architecture Tests (Konsist)
        run: ./gradlew :shared:testing:test --no-daemon

      - name: Shell Script Analysis (shellcheck)
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          find scripts/ -name "*.sh" -exec shellcheck {} \;

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            **/build/reports/kover/
          retention-days: 7
