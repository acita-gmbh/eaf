name: CI - Fast Feedback (Optimized)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Build once (cached for subsequent jobs)
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup CI Gradle Configuration
        run: cp .github/ci-gradle.properties gradle.properties

      # Additional dependency cache (complements setup-gradle's automatic caching)
      # setup-gradle caches: build-cache, wrapper, notifications
      # This adds: modules-2 (for faster dependency resolution)
      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/wrapper
            ~/.gradle/caches/build-cache-1
          key: gradle-deps-${{ hashFiles('**/*.gradle.kts', 'gradle.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-deps-

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          cache-cleanup: always

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Project
        run: ./gradlew assemble --no-daemon --build-cache --scan

      - name: Cache Build Outputs
        uses: actions/cache/save@v4
        if: github.ref == 'refs/heads/main'
        with:
          path: '**/build/'
          key: build-${{ github.sha }}

  # Job 2: Quality checks (parallel)
  quality:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      fail-fast: false
      matrix:
        # V2: konsist removed from matrix - architecture tests run in 'test' task
        check: [ktlint, detekt]

    steps:
      - uses: actions/checkout@v4

      - name: Setup CI Gradle Configuration
        run: cp .github/ci-gradle.properties gradle.properties

      - uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: wrapper
          cache-read-only: true

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Restore Build Cache
        uses: actions/cache/restore@v4
        with:
          path: '**/build/'
          key: build-${{ github.sha }}

      - name: Run ${{ matrix.check }}
        run: |
          case "${{ matrix.check }}" in
            ktlint) ./gradlew ktlintCheck --no-daemon --build-cache ;;
            detekt) ./gradlew detekt --no-daemon --build-cache ;;
            # V2: konsistTest removed - architecture tests run in 'test' task
            # konsist job now runs standard test task (includes Konsist tests)
          esac

  # Job 3: Tests (parallel by type)
  tests:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        test-type: [unit, integration]

    steps:
      - uses: actions/checkout@v4

      - name: Setup CI Gradle Configuration
        run: cp .github/ci-gradle.properties gradle.properties

      - uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: wrapper
          cache-read-only: true

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Restore Build Cache
        uses: actions/cache/restore@v4
        with:
          path: '**/build/'
          key: build-${{ github.sha }}

      - name: Run ${{ matrix.test-type }} Tests
        run: |
          if [ "${{ matrix.test-type }}" = "unit" ]; then
            ./gradlew test --no-daemon --build-cache --scan
          elif [ "${{ matrix.test-type }}" = "integration" ]; then
            ./gradlew integrationTest --no-daemon --build-cache --scan
          fi

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports-${{ matrix.test-type }}-${{ github.run_number }}
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7

  # Job 4: Coverage (runs after tests)
  coverage:
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup CI Gradle Configuration
        run: cp .github/ci-gradle.properties gradle.properties

      - uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: wrapper
          cache-read-only: true

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Restore Build Cache
        uses: actions/cache/restore@v4
        with:
          path: '**/build/'
          key: build-${{ github.sha }}

      - name: Generate Coverage Report
        run: ./gradlew koverXmlReport --no-daemon

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: '**/build/reports/kover/report.xml'
          flags: unittests,integrationtests
          name: eaf-coverage
          fail_ci_if_error: false
          verbose: true

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-reports-${{ github.run_number }}
          path: '**/build/reports/kover/'
          retention-days: 90

  # Job 5: Shell script analysis (scripts + git hooks)
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck on scripts and git hooks
        run: find scripts/ .git-hooks/ -name "*.sh" -exec shellcheck {} +
