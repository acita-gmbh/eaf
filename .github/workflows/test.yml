name: CI - Quality Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'release/**'
  schedule:
    - cron: '30 1 * * 1,3' # Mon/Thu deep checks
  workflow_dispatch:
    inputs:
      reason:
        description: 'Optional context for manual execution'
        required: false
      burn_iterations:
        description: 'Override burn-in iterations (default 10)'
        required: false

env:
  BASELINE_BRANCH: origin/main

permissions:
  contents: read

jobs:
  selective-guard:
    name: Selective Guard
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      docs_only: ${{ steps.guard.outputs.docs_only }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run selective tests
        id: guard
        env:
          BASE_REF: ${{ env.BASELINE_BRANCH }}
          HEAD_REF: ${{ github.sha }}
          FORCE_FULL_SUITE: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}
        run: |
          chmod +x scripts/test-changed.sh
          ./scripts/test-changed.sh

      - name: Upload selective artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selective-outputs
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7

  gradle-quality:
    name: Gradle Quality Matrix
    needs: selective-guard
    if: needs.selective-guard.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: build-static
            gradle_tasks: "assemble ktlintCheck detekt"
          - name: ci-tests
            gradle_tasks: "ciTests"
          - name: integration-tests
            gradle_tasks: "integrationTest"
          - name: architecture-tests
            gradle_tasks: ":shared:testing:test"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Gradle ${{ matrix.name }}
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 2
          command: ./gradlew ${{ matrix.gradle_tasks }} --no-daemon --stacktrace

      - name: Upload ${{ matrix.name }} artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
            **/build/reports/ktlint/
            **/build/reports/detekt/
          retention-days: 14

  shell-lint:
    name: Shell Lint
    needs: selective-guard
    runs-on: ubuntu-latest
    if: needs.selective-guard.outputs.docs_only != 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        id: shelllint
        run: |
          set -o pipefail
          if find scripts/ -name "*.sh" -print0 | xargs -0 shellcheck | tee shellcheck.log; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload shellcheck log
        if: steps.shelllint.outputs.status == 'failed'
        uses: actions/upload-artifact@v4
        with:
          name: shellcheck-report
          path: shellcheck.log
      - name: Fail on shellcheck issues
        if: steps.shelllint.outputs.status == 'failed'
        run: |
          echo "::error::Shellcheck reported issues. See shellcheck-report artifact for details."
          exit 1

  burn-in:
    name: Burn-In Loop
    needs:
      - selective-guard
      - gradle-quality
      - shell-lint
    if: needs.selective-guard.outputs.docs_only != 'true' && (github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/release/') || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Resolve burn-in iterations
        id: burn_config
        env:
          EVENT_NAME: ${{ github.event_name }}
          BURN_INPUT: ${{ github.event.inputs.burn_iterations }}
        run: |
          iterations=10
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$BURN_INPUT" ]; then
            iterations="$BURN_INPUT"
          fi
          echo "iterations=$iterations" >> "$GITHUB_OUTPUT"

      - name: Execute burn-in loop
        env:
          BURN_IN_ITERATIONS: ${{ steps.burn_config.outputs.iterations }}
          BURN_IN_TASKS: "ciTests integrationTest"
        run: |
          chmod +x scripts/burn-in.sh
          ./scripts/burn-in.sh

      - name: Upload burn-in artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: burn-in-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 14
