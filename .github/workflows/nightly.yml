name: Nightly - Deep Validation

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel long-running nightly builds

jobs:
  deep-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 hours max (target ~2.5h)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-cleanup: always

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Performance Baseline Tests
        run: ./gradlew :products:widget-demo:gatlingRun --no-daemon --stacktrace
        continue-on-error: false  # Fail build if performance targets not met

      - name: Snapshot Performance Tests
        run: ./gradlew :products:widget-demo:integrationTest --tests "SnapshotPerformanceTest" --no-daemon --stacktrace

      - name: Property-Based Tests
        run: ./gradlew propertyTest --no-daemon --stacktrace

      - name: Fuzz Tests (Jazzer)
        run: ./gradlew fuzzTest --no-daemon --stacktrace

      # TODO(Epic 8 Story 4.10): Enable LitmusKt concurrency tests
      # - name: Concurrency Tests (LitmusKt)
      #   run: ./gradlew litmusTest --no-daemon --stacktrace

      - name: Mutation Testing (Pitest)
        run: ./gradlew pitest --no-daemon --stacktrace

      - name: Upload Property Test Reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: property-test-reports-${{ github.run_number }}
          path: |
            **/build/reports/tests/propertyTest/
          retention-days: 30

      - name: Upload Fuzz Test Reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: fuzz-test-reports-${{ github.run_number }}
          path: |
            **/build/reports/tests/fuzzTest/
          retention-days: 30

      # TODO(Epic 8 Story 4.10): Enable LitmusKt test report upload
      # - name: Upload Concurrency Test Reports
      #   if: always()
      #   uses: actions/upload-artifact@v5
      #   with:
      #     name: concurrency-test-reports
      #     path: |
      #       **/build/reports/tests/litmusTest/
      #     retention-days: 14

      - name: Upload Performance Test Reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: performance-test-reports-${{ github.run_number }}
          path: |
            **/build/reports/gatling/
            **/build/reports/tests/integrationTest/
          retention-days: 90

      - name: Upload Mutation Test Reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: mutation-test-reports-${{ github.run_number }}
          path: |
            **/build/reports/pitest/
          retention-days: 90

      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::Nightly deep validation failed. Review uploaded artifacts for details."
          exit 1
