name: Nightly Deep Validation Pipeline

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.event_name == 'pull_request' }}

      - name: Prime compilation
        run: ./gradlew compileKotlin --no-daemon --stacktrace

      - name: Run ktlint and Detekt
        run: ./gradlew ktlintCheck detekt --no-daemon --stacktrace

      - name: Run Konsist architecture tests
        id: konsist-test
        run: |
          ./gradlew ciKonsistTest --no-daemon --stacktrace
          # Check if any test results were generated
          if find . -path "*/build/test-results/ciKonsistTest/*.xml" -print -quit | grep -q .; then
            echo "has_results=true" >> $GITHUB_OUTPUT
          else
            echo "has_results=false" >> $GITHUB_OUTPUT
            echo "::notice::No Konsist test results found - this is expected if no Konsist tests are defined yet"
          fi

  nightly-deep-validation:
    needs: quality-gates
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install pnpm dependencies
        run: pnpm install

      - name: Build Admin Shell
        run: pnpm run build:admin-shell

      - name: Run Baseline Tests
        run: ./gradlew test integrationTest

      - name: Run Property-Based Tests
        # Story 8.7: Set nightlyBuild property to enable nightly-only tests
        run: ./gradlew propertyTest -PnightlyBuild=true

      - name: Restore fuzz corpus
        uses: actions/cache/restore@v4
        with:
          path: |
            framework/security/.cifuzz-corpus
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-

      - name: Run Fuzz Tests
        # Story 8.7 AC3: Fuzz testing with time limits
        # Story 8.8: EMPIRICAL FINDING - Jazzer 0.24.0 with JAZZER_FUZZ=1 runs ONLY ONE @FuzzTest per invocation
        #            This is EVEN MORE RESTRICTIVE than initially thought - filtering by class still runs only 1 method
        #            Source: https://github.com/CodeIntelligenceTesting/jazzer/issues/599
        # SOLUTION: Invoke fuzzTest task 7 times (once per @FuzzTest method)
        #           Each invocation: ~5 minutes
        #           Total: 7 methods × 5min = ~35-40 minutes with Gradle overhead
        # CACHE: Uses github.run_id (not github.sha) to allow incremental fuzzing across runs
        run: |
          echo "🔍 Starting fuzz testing (7 individual @FuzzTest methods = ~35-40 minutes)"

          echo "▶️  [1/7] JwtFormatFuzzer.fuzzJwtBasicFormatValidation..."
          ./gradlew fuzzTest -PnightlyBuild=true \
            --tests "com.axians.eaf.framework.security.fuzz.JwtFormatFuzzer.fuzzJwtBasicFormatValidation"

          echo "▶️  [2/7] TokenExtractorFuzzer.fuzzTokenExtraction..."
          ./gradlew fuzzTest -PnightlyBuild=true \
            --tests "com.axians.eaf.framework.security.fuzz.TokenExtractorFuzzer.fuzzTokenExtraction"

          echo "▶️  [3/7] TokenExtractorFuzzer.fuzzTokenExtractionWithNull..."
          ./gradlew fuzzTest -PnightlyBuild=true \
            --tests "com.axians.eaf.framework.security.fuzz.TokenExtractorFuzzer.fuzzTokenExtractionWithNull"

          echo "▶️  [4/7] RoleNormalizationFuzzer.fuzzRoleNormalization..."
          ./gradlew fuzzTest -PnightlyBuild=true \
            --tests "com.axians.eaf.framework.security.fuzz.RoleNormalizationFuzzer.fuzzRoleNormalization"

          echo "▶️  [5/7] RoleNormalizationFuzzer.fuzzRoleNormalizationWithNull..."
          ./gradlew fuzzTest -PnightlyBuild=true \
            --tests "com.axians.eaf.framework.security.fuzz.RoleNormalizationFuzzer.fuzzRoleNormalizationWithNull"

          echo "▶️  [6/7] RoleNormalizationFuzzer.fuzzRoleNormalizationInjectionPatterns..."
          ./gradlew fuzzTest -PnightlyBuild=true \
            --tests "com.axians.eaf.framework.security.fuzz.RoleNormalizationFuzzer.fuzzRoleNormalizationInjectionPatterns"

          echo "▶️  [7/7] RoleNormalizationFuzzer.fuzzRoleNormalizationUnicodeAttacks..."
          ./gradlew fuzzTest -PnightlyBuild=true \
            --tests "com.axians.eaf.framework.security.fuzz.RoleNormalizationFuzzer.fuzzRoleNormalizationUnicodeAttacks"

          echo "✅ All 7 fuzz tests completed successfully"

      - name: Save fuzz corpus
        if: ${{ always() }}
        uses: actions/cache/save@v4
        with:
          path: |
            framework/security/.cifuzz-corpus
            framework/security/.jazzer/crashes
          key: fuzz-corpus-${{ github.run_id }}

      - name: Run Mutation Testing
        run: ./gradlew pitest

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests'

      - name: Upload Mutation Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-reports
          path: '**/build/reports/pitest'

      - name: Upload Fuzz Crash Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-reports
          path: '**/build/reports/jazzer'

  create-failure-issue:
    if: ${{ failure() }}
    needs: [nightly-deep-validation]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create GitHub Issue on Failure
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runId = context.runId;
            const runNumber = context.runNumber;
            const workflow = context.workflow;
            const repo = context.repo.owner + '/' + context.repo.repo;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${repo}/actions/runs/${runId}`;
            const now = new Date().toISOString();

            const title = `Nightly Validation Failed: ${workflow} #${runNumber}`;
            const body = `
              ## Nightly Deep Validation Failure

              **Date**: ${now}
              **Workflow**: [Link to run](${runUrl})
              **Run ID**: ${runId}
              **Run Number**: ${runNumber}

              Please investigate the failure. Review the workflow run logs for details.
            `;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['nightly-failure', 'testing', 'bug']
            });