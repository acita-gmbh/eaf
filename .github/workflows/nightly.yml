name: Nightly Deep Validation Pipeline

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  nightly-deep-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run Baseline Tests
        run: ./gradlew test integrationTest

      - name: Run Property-Based Tests
        run: ./gradlew propertyTest

      - name: Restore fuzz corpus
        uses: actions/cache/restore@v4
        with:
          path: |
            framework/security/.jazzer/corpus
          key: fuzz-corpus-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-

      - name: Run Fuzz Tests
        run: ./gradlew fuzzTest --args="-max_total_time=1800"

      - name: Save fuzz corpus
        uses: actions/cache/save@v4
        with:
          path: |
            framework/security/.jazzer/corpus
            framework/security/.jazzer/crashes
          key: fuzz-corpus-${{ github.sha }}

      - name: Run Mutation Testing
        run: ./gradlew pitest

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests'

      - name: Upload Mutation Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-reports
          path: '**/build/reports/pitest'

      - name: Upload Fuzz Crash Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-reports
          path: '**/build/reports/jazzer'

  create-failure-issue:
    if: ${{ failure() }}
    needs: [nightly-deep-validation]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create GitHub Issue on Failure
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runId = context.runId;
            const runNumber = context.runNumber;
            const workflow = context.workflow;
            const repo = context.repo.owner + '/' + context.repo.repo;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${repo}/actions/runs/${runId}`;
            const now = new Date().toISOString();

            const title = `Nightly Validation Failed: ${workflow} #${runNumber}`;
            const body = `
              ## Nightly Deep Validation Failure

              **Date**: ${now}
              **Workflow**: [Link to run](${runUrl})
              **Run ID**: ${runId}
              **Run Number**: ${runNumber}

              Please investigate the failure. Review the workflow run logs for details.
            `;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['nightly-failure', 'testing', 'bug']
            });