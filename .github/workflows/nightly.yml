
name: Nightly Deep Validation

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  nightly-deep-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run Baseline Tests
        run: ./gradlew test integrationTest

      - name: Run Property-Based Tests
        run: ./gradlew propertyTest

      - name: Restore fuzz corpus
        uses: actions/cache/restore@v4
        with:
          path: |
            framework/security/.jazzer/corpus
          key: fuzz-corpus-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-

      - name: Run Fuzz Tests
        run: ./gradlew fuzzTest --args="-max_total_time=1800"

      - name: Save fuzz corpus
        uses: actions/cache/save@v4
        with:
          path: |
            framework/security/.jazzer/corpus
            framework/security/.jazzer/crashes
          key: fuzz-corpus-${{ github.sha }}

      - name: Run Mutation Testing
        run: ./gradlew pitest

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests'

      - name: Upload Mutation Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-reports
          path: '**/build/reports/pitest'

      - name: Upload Fuzz Crash Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-reports
          path: '**/build/reports/jazzer'

  create-failure-issue:
    if: ${{ failure() }}
    needs: [nightly-deep-validation]
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Issue on Failure
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `Nightly Validation Failed: ${{ github.workflow }} #${{ github.run_number }}`;
            const body = `
              ## Nightly Deep Validation Failure

              **Date**: ${{ github.run_started_at }}
              **Workflow**: [Link to run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

              Please investigate the failure.
            `;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['nightly-failure', 'testing', 'bug']
            });
