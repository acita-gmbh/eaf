name: Nightly - Deep Validation

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  workflow_dispatch:  # Allow manual trigger

jobs:
  deep-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 hours max (target ~2.5h)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x ./gradlew

      - name: Clean Up Previous Infrastructure
        run: |
          # Remove any leftover containers and volumes from previous runs
          docker compose down -v --remove-orphans || true
          echo "Previous infrastructure cleaned up"

      - name: Start Infrastructure Services
        run: |
          # Start only essential services for Gatling tests (skip prometheus/grafana for speed)
          docker compose up -d postgres redis keycloak
          echo "Infrastructure services started"

      - name: Wait for Infrastructure Services
        run: |
          echo "Waiting for PostgreSQL..."
          timeout 60 bash -c 'until docker exec eaf-postgres pg_isready -U eaf_user -d eaf 2>/dev/null; do sleep 2; done'
          echo "PostgreSQL is ready!"

          echo "Waiting for Redis..."
          timeout 30 bash -c 'until docker exec eaf-redis redis-cli ping 2>/dev/null | grep -q PONG; do sleep 2; done'
          echo "Redis is ready!"

          echo "Waiting for Keycloak..."
          timeout 120 bash -c 'until [ "$(docker inspect -f {{.State.Health.Status}} eaf-keycloak 2>/dev/null)" = "healthy" ]; do sleep 5; done'
          echo "Keycloak health check passed!"

          echo "Verifying Keycloak realm import..."
          timeout 60 bash -c 'until curl -f http://localhost:8080/realms/eaf 2>/dev/null | grep -q "eaf"; do sleep 3; done'
          echo "Keycloak realm 'eaf' is available!"

          echo "Verifying Keycloak JWKS endpoint..."
          timeout 60 bash -c 'until curl -f http://localhost:8080/realms/eaf/protocol/openid-connect/certs 2>/dev/null | grep -q "keys"; do sleep 3; done'
          echo "Keycloak JWKS endpoint is responding!"

          echo "Testing Keycloak authentication (critical for Gatling tests)..."
          # Test password grant flow with admin user
          AUTH_RESPONSE=$(curl -X POST http://localhost:8080/realms/eaf/protocol/openid-connect/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=password" \
            -d "client_id=eaf-api" \
            -d "client_secret=eaf-api-secret-development-only" \
            -d "username=admin" \
            -d "password=admin" \
            -w "\n%{http_code}" -s)

          HTTP_CODE=$(echo "$AUTH_RESPONSE" | tail -1)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Keycloak authentication test failed with HTTP $HTTP_CODE"
            echo "Response: $AUTH_RESPONSE"
            echo "This will cause Gatling tests to fail. Checking Keycloak logs..."
            docker logs eaf-keycloak --tail 100
            exit 1
          fi

          # Verify we got an access token
          if echo "$AUTH_RESPONSE" | grep -q "access_token"; then
            echo "✓ Keycloak authentication test passed! Admin user can authenticate."
          else
            echo "ERROR: Keycloak returned 200 but no access_token in response"
            echo "Response: $AUTH_RESPONSE"
            exit 1
          fi

          echo "All infrastructure services are healthy!"

      - name: Build Widget Demo Application
        run: ./gradlew :products:widget-demo:assemble --no-daemon

      - name: Start Widget Demo Application
        run: |
          echo "Starting application with JWT config for localhost Keycloak..."
          nohup ./gradlew :products:widget-demo:bootRun \
            --args='--server.port=8090 --eaf.security.jwt.issuer-uri=http://localhost:8080/realms/eaf --eaf.security.jwt.jwks-uri=http://localhost:8080/realms/eaf/protocol/openid-connect/certs' \
            > app.log 2>&1 &
          echo $! > app.pid
          echo "Started application with PID $(cat app.pid)"
          echo "JWT Issuer URI: http://localhost:8080/realms/eaf"
          echo "JWT JWKS URI: http://localhost:8080/realms/eaf/protocol/openid-connect/certs"

      - name: Wait for Application Startup
        run: |
          echo "Waiting for application to be ready..."
          TIMEOUT=120
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            # Try health check
            if curl -f http://localhost:8090/actuator/health 2>/dev/null; then
              echo "Application is ready!"
              exit 0
            fi

            # Show last 10 lines of log for debugging
            if [ -f app.log ]; then
              echo "=== Last 10 lines of app.log ==="
              tail -10 app.log
              echo "================================"
            fi

            echo "Waiting for application... ($ELAPSED/$TIMEOUT seconds elapsed)"
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done

          echo "ERROR: Application failed to start within $TIMEOUT seconds"
          echo "=== Full application log ==="
          cat app.log || echo "No log file found"
          exit 1

      - name: Manual API Test (Pre-Gatling Validation)
        run: |
          echo "Testing API endpoints manually before Gatling run..."

          # Get JWT token
          echo "1. Getting JWT token for admin user..."
          TOKEN_RESPONSE=$(curl -X POST http://localhost:8080/realms/eaf/protocol/openid-connect/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=password" \
            -d "client_id=eaf-api" \
            -d "client_secret=eaf-api-secret-development-only" \
            -d "username=admin" \
            -d "password=admin" \
            -s)

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "ERROR: Failed to get access token"
            echo "Response: $TOKEN_RESPONSE"
            exit 1
          fi

          echo "✓ Got access token (first 50 chars): ${ACCESS_TOKEN:0:50}..."

          # Test POST /api/v1/widgets (Create Widget)
          echo ""
          echo "2. Testing POST /api/v1/widgets (Create Widget)..."
          CREATE_RESPONSE=$(curl -X POST http://localhost:8090/api/v1/widgets \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"ManualTestWidget"}' \
            -w "\nHTTP_CODE:%{http_code}" \
            -s)

          CREATE_HTTP_CODE=$(echo "$CREATE_RESPONSE" | grep "HTTP_CODE" | cut -d: -f2)
          CREATE_BODY=$(echo "$CREATE_RESPONSE" | grep -v "HTTP_CODE")

          echo "Response Code: $CREATE_HTTP_CODE"
          echo "Response Body: $CREATE_BODY"

          if [ "$CREATE_HTTP_CODE" != "201" ]; then
            echo "ERROR: Expected 201 Created, got $CREATE_HTTP_CODE"
            echo "This explains why Gatling Create Widget requests are failing!"
          else
            echo "✓ POST /api/v1/widgets succeeded with 201"
          fi

          # Test GET /api/v1/widgets (List Widgets)
          echo ""
          echo "3. Testing GET /api/v1/widgets (List Widgets)..."
          LIST_RESPONSE=$(curl -X GET "http://localhost:8090/api/v1/widgets?limit=50" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Accept: application/json" \
            -w "\nHTTP_CODE:%{http_code}" \
            -s)

          LIST_HTTP_CODE=$(echo "$LIST_RESPONSE" | grep "HTTP_CODE" | cut -d: -f2)
          LIST_BODY=$(echo "$LIST_RESPONSE" | grep -v "HTTP_CODE")

          echo "Response Code: $LIST_HTTP_CODE"
          echo "Response Body: $LIST_BODY"

          if [ "$LIST_HTTP_CODE" != "200" ]; then
            echo "ERROR: Expected 200 OK, got $LIST_HTTP_CODE"
            echo "This explains why Gatling List Widgets requests are failing!"

            # Show application logs for debugging
            echo ""
            echo "=== Last 50 lines of application log ==="
            tail -50 app.log || echo "No log file found"
          else
            echo "✓ GET /api/v1/widgets succeeded with 200"
          fi

          echo ""
          echo "Manual API test complete. Proceeding to Gatling tests..."

      - name: Performance Baseline Tests
        run: ./gradlew :products:widget-demo:gatlingRun --no-daemon --stacktrace
        continue-on-error: false  # Fail build if performance targets not met

      - name: Stop Widget Demo Application
        if: always()
        run: |
          if [ -f app.pid ]; then
            APP_PID=$(cat app.pid)
            echo "Stopping application (PID: $APP_PID)"
            kill $APP_PID || true
            # Wait for graceful shutdown
            timeout 30 bash -c "while kill -0 $APP_PID 2>/dev/null; do sleep 1; done" || kill -9 $APP_PID || true
            rm app.pid
          fi

      - name: Upload Application Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: widget-demo-app-logs
          path: app.log
          retention-days: 14

      - name: Snapshot Performance Tests
        run: ./gradlew :products:widget-demo:integrationTest --tests "SnapshotPerformanceTest" --no-daemon --stacktrace

      - name: Property-Based Tests
        run: ./gradlew propertyTest --no-daemon --stacktrace

      - name: Fuzz Tests (Jazzer)
        run: ./gradlew fuzzTest --no-daemon --stacktrace

      # TODO(Epic 8 Story 4.10): Enable LitmusKt concurrency tests
      # - name: Concurrency Tests (LitmusKt)
      #   run: ./gradlew litmusTest --no-daemon --stacktrace

      - name: Mutation Testing (Pitest)
        run: ./gradlew pitest --no-daemon --stacktrace

      - name: Upload Property Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: property-test-reports
          path: |
            **/build/reports/tests/propertyTest/
          retention-days: 14

      - name: Upload Fuzz Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-test-reports
          path: |
            **/build/reports/tests/fuzzTest/
          retention-days: 14

      # TODO(Epic 8 Story 4.10): Enable LitmusKt test report upload
      # - name: Upload Concurrency Test Reports
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: concurrency-test-reports
      #     path: |
      #       **/build/reports/tests/litmusTest/
      #     retention-days: 14

      - name: Upload Performance Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-test-reports
          path: |
            **/build/reports/gatling/
            **/build/reports/tests/integrationTest/
          retention-days: 30

      - name: Upload Mutation Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-test-reports
          path: |
            **/build/reports/pitest/
          retention-days: 30

      - name: Stop Infrastructure Services
        if: always()
        run: |
          echo "Stopping infrastructure services..."
          docker compose down -v
          echo "Infrastructure services stopped"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::Nightly deep validation failed. Review uploaded artifacts for details."
          exit 1
