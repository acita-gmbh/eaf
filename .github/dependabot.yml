# Dependabot configuration for EAF project
# See: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Gradle dependencies (libraries, plugins)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"  # More frequent for security updates
      time: "03:00"      # After nightly tests complete (2 AM UTC)
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "acita-gmbh/engineering"  # Update with actual team
    labels:
      - "dependencies"
      - "gradle"
      - "automated"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      # Ignore major version bumps for critical dependencies requiring migration
      - dependency-name: "org.axonframework:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.springframework.boot:*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "acita-gmbh/engineering"
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    commit-message:
      prefix: "ci"

  # Docker base images (for init-dev.sh and future Dockerfiles)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "acita-gmbh/engineering"
    labels:
      - "dependencies"
      - "docker"
      - "automated"
    commit-message:
      prefix: "chore"
