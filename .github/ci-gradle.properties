# ============================================================================
# CI-Optimized Gradle Configuration for GitHub Actions
# ============================================================================
# GitHub Actions Standard Runner: 2 cores, 7GB RAM
# This configuration is optimized for ephemeral CI environments

# Daemon (disabled for CI - ephemeral runners, no reuse benefit)
org.gradle.daemon=false

# JVM Memory (GitHub Actions: 7GB total, leave room for test processes)
org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=768m -XX:+HeapDumpOnOutOfMemoryError \
  -XX:+UseParallelGC -Dfile.encoding=UTF-8

# Parallel Execution (GitHub Actions: 2-core runners)
org.gradle.parallel=true
org.gradle.workers.max=2

# Caching
org.gradle.caching=true
# Configuration cache disabled - causes Kotest test discovery issues (Story 4.2, 4.6)
org.gradle.configuration-cache=false

# File System Watching (DISABLED for CI - ephemeral filesystem, no benefit)
org.gradle.vfs.watch=false

# Kotlin Compiler (in-process for CI - lower overhead without daemon)
kotlin.daemon.jvmargs=-Xmx1g -Xms512m -XX:ReservedCodeCacheSize=256m -XX:+UseParallelGC
kotlin.incremental=true
kotlin.compiler.execution.strategy=in-process

# CI-Specific Settings
org.gradle.console=plain
org.gradle.warning.mode=all
