[versions]
# Core language and runtime (PINNED/LOCKED)
kotlin = "2.2.21"          # Testing Kotlin 2.2.x with detekt 2.0.0-alpha.0
kotlinx-serialization = "1.9.0"  # Kotest 6.0.4 XML reporter has known incompatibility (use ciTest for CI - see ci.yml)
kotlinx-coroutines = "1.10.2"  # Kotlin coroutines library
java = "21"                # LTS requirement
gradle = "9.1.0"           # Build tool version (defined in gradle-wrapper.properties)

# Framework stack (UPDATED for compatibility)
spring-boot = "3.5.7"     # Current GA (released 2025-10-23)
spring-framework = "6.2.12" # Spring Framework core - CVE-2025-24928 fix
spring-modulith = "1.4.4" # Updated from 1.3.0 (tested compatible)
spring-dependency-management = "1.1.7"

# CQRS and Event Sourcing
axon = "4.12.2"            # Latest stable, v5 migration planned
arrow = "2.2.0"            # Functional programming

# Database and persistence
postgresql = "42.7.8"      # PostgreSQL driver (security updates)
flyway = "11.17.0"         # Database migration framework
jooq = "3.20.9"           # SQL DSL for read projections (updated)
jackson = "2.20.1"         # JSON processing (matches Spring Boot BOM)
netty = "4.1.125.Final"    # Story 1.9: CVE-2025-55163, CVE-2025-58056, CVE-2025-58057 fixes
grpc-netty-shaded = "1.75.0" # CVE-2025-55163 fix (gRPC Netty DoS vulnerability)
commons-lang3 = "3.18.0"   # Story 1.9: CVE-2025-48924 fix (uncontrolled recursion)

# Testing framework (MANDATORY)
kotest = "6.0.4"          # Primary testing framework (JUnit forbidden)
kotest-plugin = "6.0.4"   # Kotest Gradle plugin for hybrid test execution (native + JUnit Platform)
kotest-assertions-arrow = "2.0.0"  # Kotest Arrow assertions extension
testcontainers = "1.21.3" # Integration testing with real dependencies (stability updates)
testcontainers-keycloak = "3.9.0"  # Testcontainers Keycloak module
h2 = "2.4.240"            # ONLY for Nullable Pattern unit tests (Story 2.8) - Integration tests MUST use Testcontainers PostgreSQL
hamcrest = "3.0"          # Hamcrest matchers - required by Axon Test Framework

# Quality gates and static analysis
ktlint = "1.7.1"          # Code formatting (better Kotlin 2.2 support)
ktlint-gradle-plugin = "14.0.1"  # ktlint Gradle plugin version
detekt = "1.23.8"         # Static analysis (latest stable - targets Kotlin 2.0.21, works with 2.2.21)
konsist = "0.17.3"        # Architecture testing
pitest = "1.19.0-rc.2"    # Gradle plugin version (Gradle 9 compatible)
pitest-tool = "1.17.4"    # Pitest tool version (latest 1.17.x that exists)
pitest-junit5 = "1.2.1"    # Pitest JUnit 5 plugin version
kover = "0.9.3"           # Kotlin-native code coverage (Story 8.6: replaces JaCoCo)
# jacoco = "0.8.12"       # Story 8.6: Replaced with Kover for better Kotlin support
dependency-check = "12.1.9" # Supply chain scanning
cyclonedx = "3.0.2"       # SBOM generation (CycloneDX Gradle plugin) - CVE-2025-64518 fix

# Documentation
dokka = "2.1.0"          # API documentation
springdoc = "2.8.14"       # OpenAPI documentation (keeping stable version)

# Observability
micrometer = "1.16.0"     # Metrics (updated, avoiding milestone)
logback = "1.5.21"        # Spring Boot 3.5.7 actual BOM version (matches spring-boot-starter-logging dependency)
logstash-logback-encoder = "9.0"  # JSON logging encoder for structured logs (latest stable)
opentelemetry-bom = "1.55.0"  # Latest stable OpenTelemetry for distributed tracing
opentelemetry-instrumentation = "2.21.0"  # Spring Boot auto-instrumentation (latest stable)
opentelemetry-semconv = "1.37.0"  # OpenTelemetry semantic conventions
snakeyaml = "2.5"         # YAML parsing (security update)
commons-io = "2.21.0"     # IO utilities (security update)

# Security
keycloak = "26.4.2"       # Identity provider (verified current stable 2025-10-30)
jose4j = "0.9.6"          # JWT processing
spring-security = "6.5.6" # Spring Security test dependency

# Cache and session storage
redis = "3.5.6"           # Spring Boot Data Redis (matches Spring Boot baseline)

# Workflow
flowable = "7.2.0"        # BPMN workflow engine (Story 6.1)
jsch = "2.27.6"           # Java SSH client (maintained fork, CVE-2023-48795 patched) - Story 6.4

# Tools
picocli = "4.7.7"         # CLI framework (Story 7.1) - latest stable
mustache = "0.9.14"       # Logic-less template engine (Story 7.1)

# Fuzz Testing (Story 8.6)
jazzer = "0.26.2"         # Coverage-guided fuzzing for JVM (Google OSS-Fuzz standard)

# Concurrency Testing (Story 4.0/4.10)
jcstress = "0.18"         # JCStress for JVM concurrency testing (JDK project)
# NOTE: LitmusKt is experimental (not on Maven Central) - will be added in Story 4.10
# Integration options: (1) Git submodule + publishToMavenLocal, (2) JCStress fallback, (3) Defer to Epic 8
# See architecture.md lines 2044-2208 for setup documentation

# Performance Testing (Story 2.13)
gatling = "3.14.0"        # Load testing framework
gatling-gradle-plugin = "3.14.9"  # Gatling Gradle plugin

# Jakarta JSON Bind
jakarta-json-bind = "3.0.1"
jakarta-servlet-api = "6.0.0"  # Jakarta Servlet API for Filter interface

[libraries]
# Kotlin and JVM
kotlin-stdlib = { module = "org.jetbrains.kotlin:kotlin-stdlib", version.ref = "kotlin" }
kotlin-reflect = { module = "org.jetbrains.kotlin:kotlin-reflect", version.ref = "kotlin" }
kotlin-coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "kotlinx-coroutines" }
kotlin-coroutines-reactor = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-reactor", version.ref = "kotlinx-coroutines" }
kotlin-test = { module = "org.jetbrains.kotlin:kotlin-test", version.ref = "kotlin" }
kotlinx-serialization-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "kotlinx-serialization" }
kotlinx-serialization-core = { module = "org.jetbrains.kotlinx:kotlinx-serialization-core", version.ref = "kotlinx-serialization" }

# Spring Boot starters
spring-boot-starter-web = { module = "org.springframework.boot:spring-boot-starter-web", version.ref = "spring-boot" }
spring-boot-starter-actuator = { module = "org.springframework.boot:spring-boot-starter-actuator", version.ref = "spring-boot" }
spring-boot-starter-security = { module = "org.springframework.boot:spring-boot-starter-security", version.ref = "spring-boot" }
